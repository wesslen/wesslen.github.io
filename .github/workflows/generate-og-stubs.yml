name: Generate OG Stub Pages

on:
  push:
    branches: [main]
    paths:
      - "posts/index.json"
      - "scripts/generate-og-stubs.py"

# Prevent concurrent runs from stepping on each other
concurrency:
  group: og-stubs
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit generated files back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the push back to main works cleanly
          fetch-depth: 0

      - name: Generate stub HTML files
        run: python3 scripts/generate-og-stubs.py

      - name: Commit and push if files changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*.html
          # Only commit if something actually changed; [skip ci] prevents
          # this commit from triggering another action run.
          git diff --cached --quiet \
            || git commit -m "chore: regenerate OG stub pages [skip ci]" \
            && git push
