name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup (htmlhint, markdownlint, prettier) ──────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── HTML linting ───────────────────────────────────────
      - name: Lint HTML
        run: npx htmlhint "*.html"

      # ── Markdown linting ───────────────────────────────────
      - name: Lint Markdown
        run: npx markdownlint-cli "posts/*.md" --ignore "posts/reference-audit.md"

      # ── Prettier format check (HTML, CSS, JS in-file) ──────
      - name: Check formatting
        run: npx prettier --check "*.html" "*.css"
