<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="Georgia,'Times New Roman',serif" font-size="13">
  <title>Benchmark accuracy vs. generalized accuracy: two estimands, same point estimate, different confidence intervals</title>
  <desc>Two side-by-side panels. Left: benchmark accuracy — CI based only on LLM nondeterminism, item set is fixed, 75.3% ± 2.1% (wider than naive). Right: generalized accuracy — CI adds item-selection variance, 75.3% ± 3.8% (wider still, correctly capturing domain uncertainty). Both share the same naive ±1.4% reference. The naive formula is wrong in opposite directions for the two estimands.</desc>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9ca3af"/>
    </marker>
    <marker id="arr-accent" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="#fafaf9" rx="4"/>
  <rect width="720" height="280" fill="none" stroke="#e2e8f0" stroke-width="1" rx="4"/>

  <!-- ── LEFT PANEL: Benchmark Accuracy ── -->
  <rect x="20" y="16" width="320" height="248" rx="6" fill="#f0ede6" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="180" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Benchmark accuracy</text>
  <text x="180" y="57" text-anchor="middle" font-size="11" fill="#6b7280">These 198 items, fixed</text>

  <!-- Biology exam analogy -->
  <rect x="36" y="68" width="288" height="34" rx="4" fill="#fafaf9" stroke="#d1d5db" stroke-width="1"/>
  <text x="180" y="84" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">Your average score on this exam</text>
  <text x="180" y="97" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">given infinite reattempts</text>

  <!-- Sources of uncertainty -->
  <text x="44" y="122" font-size="11.5" fill="#111827">Uncertainty sources:</text>
  <circle cx="52" cy="137" r="4" fill="#2563eb"/>
  <text x="62" y="141" font-size="11" fill="#111827">LLM nondeterminism (sampling)</text>
  <circle cx="52" cy="155" r="4" fill="#d1d5db"/>
  <text x="62" y="159" font-size="11" fill="#6b7280">Item selection variance — not included</text>

  <!-- CI bar: benchmark -->
  <line x1="100" y1="196" x2="260" y2="196" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="180" cy="196" r="5" fill="#2563eb"/>
  <line x1="122" y1="188" x2="122" y2="204" stroke="#2563eb" stroke-width="2"/>
  <line x1="238" y1="188" x2="238" y2="204" stroke="#2563eb" stroke-width="2"/>
  <line x1="122" y1="196" x2="238" y2="196" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="220" text-anchor="middle" font-size="11" fill="#111827">75.3% ± 2.1%</text>
  <text x="180" y="234" text-anchor="middle" font-size="10" fill="#6b7280">(wider — under-confident vs. naive)</text>

  <!-- naive reference line -->
  <line x1="144" y1="192" x2="144" y2="200" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="216" y1="192" x2="216" y2="200" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="180" y="250" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">naive: ±1.4%</text>

  <!-- ── RIGHT PANEL: Generalized Accuracy ── -->
  <rect x="380" y="16" width="320" height="248" rx="6" fill="#f0ede6" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="540" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Generalized accuracy</text>
  <text x="540" y="57" text-anchor="middle" font-size="11" fill="#6b7280">Full domain the benchmark represents</text>

  <!-- Biology exam analogy -->
  <rect x="396" y="68" width="288" height="34" rx="4" fill="#fafaf9" stroke="#d1d5db" stroke-width="1"/>
  <text x="540" y="84" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">Your average score on all biology questions</text>
  <text x="540" y="97" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">that could have been on the exam</text>

  <!-- Sources of uncertainty -->
  <text x="404" y="122" font-size="11.5" fill="#111827">Uncertainty sources:</text>
  <circle cx="412" cy="137" r="4" fill="#2563eb"/>
  <text x="422" y="141" font-size="11" fill="#111827">LLM nondeterminism (sampling)</text>
  <circle cx="412" cy="155" r="4" fill="#d97706"/>
  <text x="422" y="159" font-size="11" fill="#111827">Item selection variance — included</text>

  <!-- CI bar: generalized (wider) -->
  <line x1="460" y1="196" x2="620" y2="196" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="540" cy="196" r="5" fill="#d97706"/>
  <line x1="482" y1="188" x2="482" y2="204" stroke="#d97706" stroke-width="2"/>
  <line x1="598" y1="188" x2="598" y2="204" stroke="#d97706" stroke-width="2"/>
  <line x1="482" y1="196" x2="598" y2="196" stroke="#d97706" stroke-width="2"/>
  <text x="540" y="220" text-anchor="middle" font-size="11" fill="#111827">75.3% ± 3.8%</text>
  <text x="540" y="234" text-anchor="middle" font-size="10" fill="#6b7280">(wider — correctly captures domain uncertainty)</text>

  <!-- naive reference line -->
  <line x1="504" y1="192" x2="504" y2="200" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="576" y1="192" x2="576" y2="200" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="540" y="250" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">naive: ±1.4% (overconfident)</text>

  <!-- Centre divider label -->
  <text x="360" y="148" text-anchor="middle" font-size="22" fill="#d1d5db">vs</text>
</svg>
