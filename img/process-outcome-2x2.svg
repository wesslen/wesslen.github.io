<svg viewBox="0 0 620 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace">
  <title>Process vs. Outcome: Four quadrants of verifier scoring</title>
  <desc>A 2x2 matrix showing four combinations of process score (high/low) and outcome score (pass/fail), with examples for each quadrant.</desc>

  <!-- Axis labels -->
  <text x="310" y="22" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)" letter-spacing="0.08em" font-weight="600">OUTCOME SCORE</text>
  <text x="185" y="40" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)">PASS</text>
  <text x="435" y="40" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)">FAIL</text>

  <!-- Y-axis label -->
  <text x="18" y="210" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)" letter-spacing="0.08em" font-weight="600" transform="rotate(-90, 18, 210)">PROCESS SCORE</text>
  <text x="44" y="142" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)" transform="rotate(-90, 44, 142)">HIGH</text>
  <text x="44" y="302" text-anchor="middle" font-size="11" fill="var(--text-muted, #888)" transform="rotate(-90, 44, 302)">LOW</text>

  <!-- Border and dividers -->
  <rect x="60" y="50" width="545" height="330" fill="none" stroke="var(--border-color, #444)" stroke-width="1"/>
  <line x1="310" y1="50" x2="310" y2="380" stroke="var(--border-color, #444)" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <line x1="60" y1="215" x2="605" y2="215" stroke="var(--border-color, #444)" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>

  <!-- Q1: High process, Pass outcome -->
  <rect x="61" y="51" width="248" height="163" fill="#1a2a1a" opacity="0.7"/>
  <text x="80" y="76" font-size="12" font-weight="700" fill="#5cb85c">Standard success</text>
  <text x="80" y="95" font-size="10" fill="#bbb">Agent followed correct steps;</text>
  <text x="80" y="110" font-size="10" fill="#bbb">goal was achieved.</text>
  <text x="80" y="133" font-size="10" fill="#777">Process ✓  Outcome ✓</text>
  <rect x="80" y="145" width="215" height="55" rx="3" fill="#0d1a0d"/>
  <text x="90" y="160" font-size="9.5" fill="#bbb" font-style="italic">"Book cheapest flight" → found fare,</text>
  <text x="90" y="174" font-size="9.5" fill="#bbb" font-style="italic">clicked purchase, received</text>
  <text x="90" y="188" font-size="9.5" fill="#bbb" font-style="italic">booking confirmation.</text>

  <!-- Q2: High process, Fail outcome -->
  <rect x="311" y="51" width="293" height="163" fill="#2a2a1a" opacity="0.6"/>
  <text x="330" y="76" font-size="12" font-weight="700" fill="#f0a500">Environment blocked</text>
  <text x="330" y="95" font-size="10" fill="#bbb">Agent executed correctly;</text>
  <text x="330" y="110" font-size="10" fill="#bbb">external factor prevented completion.</text>
  <text x="330" y="133" font-size="10" fill="#777">Process ✓  Outcome ✗  (not agent's fault)</text>
  <rect x="330" y="145" width="255" height="55" rx="3" fill="#1a1a0d"/>
  <text x="340" y="160" font-size="9.5" fill="#bbb" font-style="italic">"Buy product" → navigated correctly,</text>
  <text x="340" y="174" font-size="9.5" fill="#bbb" font-style="italic">reached checkout, blocked by</text>
  <text x="340" y="188" font-size="9.5" fill="#bbb" font-style="italic">CAPTCHA. Goal unachieved.</text>

  <!-- Q3: Low process, Pass outcome -->
  <rect x="61" y="216" width="248" height="163" fill="#1a1a2a" opacity="0.6"/>
  <text x="80" y="241" font-size="12" font-weight="700" fill="#4a9eff">Unexpected path</text>
  <text x="80" y="260" font-size="10" fill="#bbb">Goal achieved via shortcut or</text>
  <text x="80" y="275" font-size="10" fill="#bbb">unintended route; steps skipped.</text>
  <text x="80" y="298" font-size="10" fill="#777">Process ✗  Outcome ✓</text>
  <rect x="80" y="310" width="215" height="55" rx="3" fill="#0d0d1a"/>
  <text x="90" y="325" font-size="9.5" fill="#bbb" font-style="italic">"Find cheapest hotel" → skipped</text>
  <text x="90" y="339" font-size="9.5" fill="#bbb" font-style="italic">filter steps, reached correct result</text>
  <text x="90" y="353" font-size="9.5" fill="#bbb" font-style="italic">via a different page.</text>

  <!-- Q4: Low process, Fail outcome -->
  <rect x="311" y="216" width="293" height="163" fill="#2a1a1a" opacity="0.6"/>
  <text x="330" y="241" font-size="12" font-weight="700" fill="#e05252">Standard failure</text>
  <text x="330" y="260" font-size="10" fill="#bbb">Agent took wrong steps;</text>
  <text x="330" y="275" font-size="10" fill="#bbb">goal was not achieved.</text>
  <text x="330" y="298" font-size="10" fill="#777">Process ✗  Outcome ✗</text>
  <rect x="330" y="310" width="255" height="55" rx="3" fill="#1a0d0d"/>
  <text x="340" y="325" font-size="9.5" fill="#bbb" font-style="italic">"Submit report" → chose wrong</text>
  <text x="340" y="339" font-size="9.5" fill="#bbb" font-style="italic">dropdown, hallucinated confirmation,</text>
  <text x="340" y="353" font-size="9.5" fill="#bbb" font-style="italic">task incomplete.</text>
</svg>
