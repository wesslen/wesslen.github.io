<svg viewBox="0 0 700 150" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>3PL IRT equation annotated: P(θ) = c + (1−c)·σ(a·(θ−b))</title>
  <desc>The three-parameter logistic IRT equation with color-coded callouts for each term. c (guessing floor, green) is highlighted as the key parameter — it is the lower asymptote of the probability curve, modeling the chance of a correct answer from pattern matching alone regardless of domain ability. a (discrimination, amber) controls curve steepness. θ (model ability, violet) is the latent trait being estimated. b (item difficulty, red) is the threshold at which the curve's midpoint lies.</desc>

  <!-- Background -->
  <rect width="700" height="150" fill="#fafaf9" rx="8"/>
  <rect width="700" height="150" fill="none" stroke="#e2e8f0" stroke-width="1" rx="8"/>

  <!-- ═══════════════════════════════════════════════
       FORMULA  (Georgia serif, font-size 22, y-baseline=90)
       Layout from x=200:
         "P(θ) = "  → ends at 268
         "c"        → guessing floor, center ≈ 274
         " + (1 − " → ends at 342
         "c"        → second c (neutral)
         ") ⋅ σ("   → ends at 400
         "a"        → discrimination, center ≈ 406
         " ⋅ ("     → ends at 438
         "θ"        → model ability, center ≈ 444
         " − "      → ends at 474
         "b"        → item difficulty, center ≈ 480
         "))"
       ═══════════════════════════════════════════════ -->

  <text x="200" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151">P(θ) = </text>
  <text x="268" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#15803d" font-weight="bold">c</text>
  <text x="280" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151"> + (1 − </text>
  <text x="342" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151">c</text>
  <text x="354" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151">) ⋅ σ(</text>
  <text x="400" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#b45309" font-weight="bold">a</text>
  <text x="412" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151"> ⋅ (</text>
  <text x="438" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#6d28d9" font-weight="bold">θ</text>
  <text x="451" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151"> − </text>
  <text x="474" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#b91c1c" font-weight="bold">b</text>
  <text x="486" y="90" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#374151">))</text>


  <!-- ═══════════════════════════════════════════════
       CALLOUT ANNOTATIONS
       ═══════════════════════════════════════════════ -->

  <!-- ── c = guessing floor  (ABOVE-LEFT, GREEN — PROMOTED) ── -->
  <!-- Thicker line + tick; taller placement to make room for sub-annotation -->
  <line x1="274" y1="70" x2="274" y2="44" stroke="#15803d" stroke-width="2.5"/>
  <line x1="263" y1="44" x2="285" y2="44" stroke="#15803d" stroke-width="2.5"/>
  <!-- Primary label — larger and bold to signal "this term is the argument" -->
  <text x="274" y="33"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="14" fill="#15803d" text-anchor="middle" font-weight="700">guessing floor</text>
  <!-- Sub-annotation — ties the parameter to the post's claim -->
  <text x="274" y="19"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="9.5" fill="#15803d" text-anchor="middle" font-style="italic" opacity="0.75">≈ hallucination floor</text>


  <!-- ── θ = model ability  (ABOVE-RIGHT, VIOLET) ── -->
  <line x1="444" y1="70" x2="444" y2="50" stroke="#6d28d9" stroke-width="1.5"/>
  <line x1="436" y1="50" x2="452" y2="50" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="444" y="40"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#6d28d9" text-anchor="middle" font-weight="500">model ability</text>


  <!-- ── a = discrimination  (BELOW-LEFT diagonal, AMBER) ── -->
  <line x1="406" y1="100" x2="372" y2="122" stroke="#b45309" stroke-width="1.5"/>
  <line x1="364" y1="122" x2="380" y2="122" stroke="#b45309" stroke-width="1.5"/>
  <text x="372" y="138"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#b45309" text-anchor="middle" font-weight="500">discrimination</text>


  <!-- ── b = item difficulty  (BELOW-RIGHT diagonal, CRIMSON) ── -->
  <line x1="480" y1="100" x2="514" y2="122" stroke="#b91c1c" stroke-width="1.5"/>
  <line x1="506" y1="122" x2="522" y2="122" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="514" y="138"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#b91c1c" text-anchor="middle" font-weight="500">item difficulty</text>

</svg>
