<svg viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace">
  <title>Welfare as a function of AI precision: interior optimum at τ* and collapse threshold at τ_A^c</title>
  <desc>Single-curve schematic. Long-run social welfare rises as AI precision increases up to an interior optimum τ*, then declines. At τ_A^c the high-knowledge steady state disappears entirely — the curve drops steeply to a new permanently low equilibrium below the no-AI welfare baseline. τ* is an optimization point you can adjust away from; τ_A^c is a phase transition and point of no return.</desc>

  <!-- ── Post-collapse zone: red tint below baseline, right of τ_A^c ── -->
  <rect x="440" y="200" width="218" height="76" fill="rgba(224,82,82,0.07)" rx="2"/>

  <!-- ── Axes ── -->
  <line x1="55" y1="30"  x2="55"  y2="278" stroke="#444c56" stroke-width="1"/>
  <line x1="55" y1="278" x2="665" y2="278" stroke="#444c56" stroke-width="1"/>
  <polygon points="662,274 670,278 662,282" fill="#444c56"/>
  <polygon points="51,33 55,25 59,33"       fill="#444c56"/>

  <!-- ── No-AI welfare baseline ── -->
  <line x1="55" y1="200" x2="660" y2="200"
        stroke="#8b949e" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
  <text x="60" y="196" font-size="8.5" fill="#5f6368" opacity="0.8">no-AI welfare baseline</text>

  <!-- ── τ* threshold line: thin violet ── -->
  <line x1="250" y1="25" x2="250" y2="278"
        stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.65"/>

  <!-- ── τ_A^c threshold line: thicker red — signals the cliff edge ── -->
  <line x1="440" y1="25" x2="440" y2="278"
        stroke="#e05252" stroke-width="1.8" stroke-dasharray="5 3" opacity="0.8"/>

  <!-- ── Welfare curve ──────────────────────────────────────────────────
       Segment 1 (τ=0 → τ_A^c): high-knowledge equilibrium — full opacity
       Segment 2 (τ > τ_A^c):   collapsed to low state — faded, signals a different regime
       ──────────────────────────────────────────────────────────────────── -->
  <path d="M 55,200 C 105,118 170,52 250,57 C 320,62 390,148 440,200"
        fill="none" stroke="#38bdf8" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 440,200 C 441,220 443,255 452,268 C 480,275 590,276 655,276"
        fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Key point dots ── -->
  <circle cx="250" cy="57"  r="5" fill="#a78bfa"/>
  <circle cx="440" cy="200" r="6" fill="#e05252"/>

  <!-- ── τ* callout: moved up, ends at y=74 so "learning crowds out" at y=110 clears it ── -->
  <line x1="252" y1="61" x2="268" y2="74" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <rect x="268" y="40" width="148" height="34" rx="3" fill="#0e1117" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="342" y="54"  text-anchor="middle" font-size="9"   fill="#a78bfa" font-weight="600">optimal precision cap</text>
  <text x="342" y="68"  text-anchor="middle" font-size="8.5" fill="#a78bfa" opacity="0.7">first-best policy: cap at τ*</text>

  <!-- ── τ_A^c callout: above baseline so it doesn't crowd the state labels below ── -->
  <line x1="441" y1="197" x2="456" y2="183" stroke="#e05252" stroke-width="1" opacity="0.7"/>
  <rect x="456" y="139" width="192" height="44" rx="3" fill="#0e1117" stroke="#e05252" stroke-width="0.8"/>
  <text x="552" y="155" text-anchor="middle" font-size="9"   fill="#e05252" font-weight="600">point of no return</text>
  <text x="552" y="168" text-anchor="middle" font-size="8"   fill="#e05252" opacity="0.75">high-knowledge steady state</text>
  <text x="552" y="179" text-anchor="middle" font-size="8"   fill="#e05252" opacity="0.75">ceases to exist</text>

  <!-- ── Mechanism annotation on the declining slope ── -->
  <text x="357" y="110" text-anchor="middle" font-size="8.5" fill="#5f6368" opacity="0.7"
        font-style="italic">learning crowds out ↘</text>

  <!-- ── Post-collapse state labels — well below the callout box ── -->
  <text x="558" y="220" text-anchor="middle" font-size="8"   fill="#5f6368" opacity="0.65">below no-AI welfare</text>
  <text x="555" y="264" text-anchor="middle" font-size="8"   fill="#e05252" opacity="0.65">low-knowledge stable state</text>

  <!-- ── Below-axis threshold labels ── -->
  <text x="250" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa">τ*</text>
  <text x="250" y="308" text-anchor="middle" font-size="8.5" fill="#5f6368">welfare optimum</text>

  <text x="440" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#e05252">τ<tspan dy="3" font-size="8">A</tspan><tspan dy="-5" font-size="8">c</tspan></text>
  <text x="440" y="308" text-anchor="middle" font-size="8.5" fill="#5f6368">collapse threshold</text>

  <!-- ── Axis labels ── -->
  <text x="360" y="322" text-anchor="middle" font-size="10" fill="#5f6368">AI recommendation precision (τ)  →</text>
  <text x="16"  y="155" text-anchor="middle" font-size="10" fill="#5f6368" transform="rotate(-90,16,155)">Long-run social welfare  ↑</text>
</svg>
