<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--text-secondary, #666)" />
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--accent, #5b6af0)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" fill="var(--bg, #fafaf8)" rx="4"/>

  <!-- ── SUPERPOPULATION CLOUD (top left) ── -->
  <g>
    <ellipse cx="110" cy="52" rx="88" ry="32" fill="var(--bg-secondary, #f0ede6)" stroke="var(--border, #ccc)" stroke-width="1.4" stroke-dasharray="5,3"/>
    <text x="110" y="45" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="11">Item superpopulation</text>
    <text x="110" y="60" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="11" font-style="italic">all possible items</text>
  </g>

  <!-- Arrow: superpopulation → items -->
  <line x1="155" y1="72" x2="172" y2="108" stroke="var(--text-secondary, #666)" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="188" y="97" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">sample n items</text>

  <!-- ── ITEM RANDOM EFFECTS LAYER ── -->
  <!-- Label -->
  <text x="14" y="165" fill="var(--text-secondary, #666)" font-size="11" font-style="italic">Items</text>
  <text x="14" y="178" fill="var(--text-secondary, #666)" font-size="11" font-style="italic">(random</text>
  <text x="14" y="191" fill="var(--text-secondary, #666)" font-size="11" font-style="italic">effects)</text>

  <!-- Item boxes -->
  <rect x="60" y="118" width="72" height="46" rx="4" fill="var(--bg-secondary, #f0ede6)" stroke="var(--border, #ccc)" stroke-width="1.4"/>
  <text x="96" y="137" text-anchor="middle" fill="var(--text-primary, #333)" font-size="12">Item 1</text>
  <text x="96" y="154" text-anchor="middle" fill="var(--accent, #5b6af0)" font-size="12" font-style="italic">δ₁ ~ N(0,σ²)</text>

  <rect x="152" y="118" width="72" height="46" rx="4" fill="var(--bg-secondary, #f0ede6)" stroke="var(--border, #ccc)" stroke-width="1.4"/>
  <text x="188" y="137" text-anchor="middle" fill="var(--text-primary, #333)" font-size="12">Item 2</text>
  <text x="188" y="154" text-anchor="middle" fill="var(--accent, #5b6af0)" font-size="12" font-style="italic">δ₂ ~ N(0,σ²)</text>

  <text x="264" y="145" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="16">…</text>

  <rect x="280" y="118" width="72" height="46" rx="4" fill="var(--bg-secondary, #f0ede6)" stroke="var(--border, #ccc)" stroke-width="1.4"/>
  <text x="316" y="137" text-anchor="middle" fill="var(--text-primary, #333)" font-size="12">Item n</text>
  <text x="316" y="154" text-anchor="middle" fill="var(--accent, #5b6af0)" font-size="12" font-style="italic">δₙ ~ N(0,σ²)</text>

  <!-- ── TRIAL LAYER (under Item 1 only, fully expanded) ── -->
  <line x1="96" y1="164" x2="96" y2="204" stroke="var(--border, #ccc)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Trial grid for Item 1 -->
  <!-- Header row: LLMs -->
  <text x="96" y="220" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5">LLM 1</text>
  <text x="148" y="220" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5">LLM 2</text>
  <text x="200" y="220" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5">…</text>
  <text x="240" y="220" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5">LLM m</text>

  <!-- Trial cells -->
  <!-- Item 1 × LLM 1 -->
  <rect x="60" y="224" width="72" height="64" rx="3" fill="white" stroke="var(--border, #ccc)" stroke-width="1"/>
  <text x="96" y="238" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 1: ✓</text>
  <text x="96" y="250" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 2: ✓</text>
  <text x="96" y="262" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 3: ✗</text>
  <text x="96" y="274" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">⋮</text>
  <text x="96" y="283" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial t: ✓</text>

  <!-- Item 1 × LLM 2 -->
  <rect x="112" y="224" width="72" height="64" rx="3" fill="white" stroke="var(--border, #ccc)" stroke-width="1"/>
  <text x="148" y="238" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 1: ✓</text>
  <text x="148" y="250" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 2: ✓</text>
  <text x="148" y="262" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 3: ✓</text>
  <text x="148" y="274" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">⋮</text>
  <text x="148" y="283" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial t: ✓</text>

  <!-- dots -->
  <text x="200" y="256" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="16">…</text>

  <!-- Item 1 × LLM m -->
  <rect x="208" y="224" width="72" height="64" rx="3" fill="white" stroke="var(--border, #ccc)" stroke-width="1"/>
  <text x="244" y="238" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 1: ✗</text>
  <text x="244" y="250" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 2: ✗</text>
  <text x="244" y="262" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial 3: ✗</text>
  <text x="244" y="274" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">⋮</text>
  <text x="244" y="283" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="9.5">trial t: ✗</text>

  <!-- Clustering brace under Item 1 trials -->
  <line x1="60" y1="296" x2="280" y2="296" stroke="var(--border, #ccc)" stroke-width="1.2"/>
  <line x1="60" y1="296" x2="60" y2="290" stroke="var(--border, #ccc)" stroke-width="1.2"/>
  <line x1="280" y1="296" x2="280" y2="290" stroke="var(--border, #ccc)" stroke-width="1.2"/>
  <text x="170" y="310" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">n × t trials share item difficulty δ₁ — not independent</text>

  <!-- ── RIGHT PANEL: LLM FIXED EFFECTS ── -->
  <rect x="390" y="100" width="300" height="170" rx="6" fill="var(--bg-secondary, #f0ede6)" stroke="var(--border, #ccc)" stroke-width="1.4"/>
  <text x="540" y="122" text-anchor="middle" fill="var(--text-primary, #333)" font-size="13" font-weight="bold">LLM Capabilities (Fixed Effects)</text>
  <text x="540" y="140" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="11.5">Estimated for <tspan font-style="italic">these specific systems</tspan></text>

  <!-- Capability bars (schematic) -->
  <text x="415" y="165" fill="var(--text-secondary, #666)" font-size="11.5" font-style="italic">θ₁</text>
  <rect x="435" y="154" width="120" height="12" rx="2" fill="var(--accent, #5b6af0)" opacity="0.8"/>
  <text x="560" y="165" fill="var(--text-secondary, #666)" font-size="10.5">high</text>

  <text x="415" y="186" fill="var(--text-secondary, #666)" font-size="11.5" font-style="italic">θ₂</text>
  <rect x="435" y="175" width="88" height="12" rx="2" fill="var(--accent, #5b6af0)" opacity="0.8"/>
  <text x="528" y="186" fill="var(--text-secondary, #666)" font-size="10.5">mid</text>

  <text x="415" y="207" fill="var(--text-secondary, #666)" font-size="11.5">…</text>

  <text x="415" y="225" fill="var(--text-secondary, #666)" font-size="11.5" font-style="italic">θₘ</text>
  <rect x="435" y="214" width="55" height="12" rx="2" fill="var(--accent, #5b6af0)" opacity="0.8"/>
  <text x="495" y="225" fill="var(--text-secondary, #666)" font-size="10.5">lower</text>

  <text x="540" y="255" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">Partial pooling: each θᵢ adjusted</text>
  <text x="540" y="269" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">for which items each LLM received</text>

  <!-- ── BOTTOM: MODEL EQUATION SUMMARY ── -->
  <rect x="390" y="295" width="300" height="62" rx="5" fill="white" stroke="var(--accent, #5b6af0)" stroke-width="1.4"/>
  <text x="540" y="313" text-anchor="middle" fill="var(--text-primary, #333)" font-size="12" font-weight="bold">π(i, j) = σ(θᵢ − δⱼ)</text>
  <text x="540" y="330" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5">P(success) = sigmoid(capability − difficulty)</text>
  <text x="540" y="347" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10">LLM fixed effect         item random effect</text>
  <!-- underline LLM fixed -->
  <line x1="426" y1="348" x2="519" y2="348" stroke="var(--accent, #5b6af0)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- underline item random -->
  <line x1="528" y1="348" x2="628" y2="348" stroke="var(--text-secondary, #666)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Caption -->
  <text x="360" y="368" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">Two-level hierarchy: items are random effects (sampled from a superpopulation); LLMs are fixed effects (these specific systems).</text>
  <text x="360" y="380" text-anchor="middle" fill="var(--text-secondary, #666)" font-size="10.5" font-style="italic">Trials within each (LLM, item) cell are correlated — the naive √(n·t) SE treats them as independent.</text>
</svg>
